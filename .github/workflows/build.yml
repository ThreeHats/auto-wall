name: Build Auto-Wall Multi-Platform

on:
  push:
    tags:
      - '*.*.*'           # stable release: 1.4.0
      - 'v*.*.*-beta.*'   # beta pre-release: v1.4.0-beta.1
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  discussions: write
  packages: write

jobs:
  # Version setup job to extract version once
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set_version.outputs.version }}
      is_release: ${{ steps.set_version.outputs.is_release }}
      is_prerelease: ${{ steps.set_version.outputs.is_prerelease }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set version number
      id: set_version
      run: |
        if [[ "${{ github.ref_type }}" == "tag" ]]; then
          VERSION="${{ github.ref_name }}"
          VERSION=${VERSION#v}  # strip leading v (v1.4.0-beta.1 -> 1.4.0-beta.1)
          IS_RELEASE="true"
          if [[ "$VERSION" == *"-beta."* ]]; then
            IS_PRERELEASE="true"
          else
            IS_PRERELEASE="false"
          fi
          echo "Setting release version to $VERSION (prerelease=$IS_PRERELEASE)"
        else
          BASE_VERSION=$(grep -oP 'APP_VERSION = "\K[^"]+' auto_wall.py)
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          IS_RELEASE="false"
          IS_PRERELEASE="false"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            VERSION="${BASE_VERSION}-pr-${{ github.event.pull_request.number }}-${SHORT_SHA}"
          else
            VERSION="${BASE_VERSION}-dev-$(date +%Y%m%d)-${SHORT_SHA}"
          fi
          echo "Setting dev version to $VERSION"
        fi

        echo "version=$VERSION"             >> $GITHUB_OUTPUT
        echo "is_release=$IS_RELEASE"       >> $GITHUB_OUTPUT
        echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT
        echo "VERSION=$VERSION"             >> $GITHUB_ENV

        # Update version in auto_wall.py
        sed -i "s/APP_VERSION = \".*\"/APP_VERSION = \"$VERSION\"/" auto_wall.py
  
  # Windows build job
  build-windows:
    needs: version
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Update version
      run: |
        $VERSION = "${{ needs.version.outputs.version }}"
        $CONTENT = Get-Content -Path "auto_wall.py" -Raw
        $NEW_CONTENT = $CONTENT -replace 'APP_VERSION = ".*"', "APP_VERSION = `"$VERSION`""
        Set-Content -Path "auto_wall.py" -Value $NEW_CONTENT -NoNewline
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Build Windows executable
      run: |
        python build.py --platform windows
    
    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Auto-Wall-Windows-${{ needs.version.outputs.version }}
        path: |
          dist/Auto-Wall.exe
        retention-days: 30
  
  # Linux build job
  build-linux:
    needs: version
    runs-on: ubuntu-22.04  # Use older Ubuntu for better GLIBC compatibility
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Update version
      run: |
        VERSION="${{ needs.version.outputs.version }}"
        sed -i "s/APP_VERSION = \".*\"/APP_VERSION = \"$VERSION\"/" auto_wall.py
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-dev python3-tk \
          fakeroot wget file desktop-file-utils \
          gzip
    
    - name: Install Python dependencies
      run: |
        python3 -m pip install --upgrade pip
        pip install -r requirements.txt -r requirements-gpu.txt

    - name: Build Linux packages
      run: |
        python3 build.py --platform linux
    
    - name: Upload Linux artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Auto-Wall-Linux-${{ needs.version.outputs.version }}
        path: |
          dist/*.AppImage
          dist/*.deb
        retention-days: 30
  
  # macOS build job
  build-macos:
    needs: version
    runs-on: macos-14-large  # Intel runner (x86_64) - works on both Intel and Apple Silicon via Rosetta 2
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Update version
      run: |
        VERSION="${{ needs.version.outputs.version }}"
        sed -i "" "s/APP_VERSION = \".*\"/APP_VERSION = \"$VERSION\"/" auto_wall.py
    
    - name: Install dependencies
      run: |
        python3 -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Verify Python environment
      run: |
        echo "Checking Python and architecture..."
        python3 -c "import platform; print(f'Python arch: {platform.machine()}')"
        python3 -c "import sys; print(f'Python version: {sys.version}')"
    
    - name: Build macOS app
      run: |
        python3 build.py --platform macos
    
    - name: Verify build was created
      run: |
        if [ -f "dist/Auto-Wall.app/Contents/MacOS/Auto-Wall" ]; then
          echo "Checking architecture of built app:"
          file dist/Auto-Wall.app/Contents/MacOS/Auto-Wall
          lipo -info dist/Auto-Wall.app/Contents/MacOS/Auto-Wall 2>/dev/null || echo "(Single architecture binary)"
        else
          echo "ERROR: Auto-Wall executable not found!"
          exit 1
        fi
    
    - name: Upload macOS artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Auto-Wall-macOS-${{ needs.version.outputs.version }}
        path: |
          dist/*.dmg
        retention-days: 30
  
  # Release job - only runs on tag pushes
  release:
    if: needs.version.outputs.is_release == 'true'
    needs: [version, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: Display structure of downloaded files
      run: ls -la artifacts/
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          artifacts/**/*
        draft: false
        prerelease: ${{ needs.version.outputs.is_prerelease == 'true' }}
        tag_name: ${{ github.ref_name }}
        name: "Auto-Wall v${{ needs.version.outputs.version }}"
        body: |
          ## Auto-Wall v${{ needs.version.outputs.version }}
          
          ### Downloads
          
          **Windows:**
          - `Auto-Wall.exe` - Standalone executable
          
          **Linux:**
          - `Auto-Wall-*-x86_64.AppImage` - Universal Linux package
          - `auto-wall_*_amd64.deb` - Debian/Ubuntu package
          
          **macOS:**
          - `Auto-Wall-macOS.dmg` - macOS installer
          
          ### Installation
          
          **Windows:** Download and run `Auto-Wall.exe`
          
          **Linux:** 
          - AppImage: `chmod +x Auto-Wall-*.AppImage && ./Auto-Wall-*.AppImage`
          - Debian: `sudo dpkg -i auto-wall_*.deb`
          
          **macOS:** Download and open `Auto-Wall-macOS.dmg`, then drag the app to Applications
          
          ### Changes
          
          See the [changelog](https://github.com/ThreeHats/auto-wall/releases) for detailed changes in this version.
        generate_release_notes: true